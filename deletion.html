  <title>資料刪除說明 | Data Deletion</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.8; }
    h1 { border-bottom: 2px solid #1877f2; padding-bottom: 10px; }
    h2 { color: #1877f2; margin-top: 30px; }
    .updated { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>用戶資料刪除</h1>
  <p class="updated">最後更新日期：2026 年 3 月 2 日</p>

  <h2>如何刪除您的資料</h2>
  <p>本應用程式不會儲存任何用戶的個人資料於外部伺服器。所有資料僅用於粉絲專頁管理，並儲存於應用程式管理者的本地環境中。</p>

  <h2>刪除方式</h2>
  <p>如您希望刪除與本應用程式相關的資料，您可以：</p>
  <ol>
    <li>前往 Facebook <strong>設定</strong> → <strong>應用程式和網站</strong></li>
    <li>找到本應用程式並點擊 <strong>移除</strong></li>
    <li>勾選「刪除所有由此應用程式發布的貼文、影片和活動」</li>
  </ol>
  <p>移除後，本應用程式將無法再存取您的任何資料。</p>

  <h2>聯絡方式</h2>
  <p>如需進一步協助，請透過粉絲專頁私訊聯繫我們。</p>
</body>
